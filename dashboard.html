<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#24463A">
<title>متابعة آية 🌿</title>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ivory:#FBF7EF;--cream:#F3EBDA;--cream-deep:#EADFC7;--pine:#24463A;--pine-soft:#3A5C4D;--sage:#8FA98A;--sage-light:#C5D2BD;--apricot:#E3A06B;--apricot-deep:#D08B53;--rose:#D58B7C;--gold:#C7A968;--ink:#2C2A24;--muted:#6F6A5C;--shadow:rgba(36,70,58,.10)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:var(--ivory);color:var(--ink);line-height:1.8;-webkit-font-smoothing:antialiased}
  .wrap{max-width:620px;margin:0 auto;padding:0 20px 60px}
  header{text-align:center;padding:48px 20px 30px;background:radial-gradient(120% 90% at 50% -10%, #FFFDF8, var(--cream))}
  .eyebrow{font-family:'Reem Kufi',sans-serif;font-size:12px;letter-spacing:3px;color:var(--apricot-deep);font-weight:600}
  header h1{font-family:'Aref Ruqaa',serif;font-size:clamp(30px,8vw,42px);color:var(--pine);margin-top:8px}
  header .d{font-size:14px;color:var(--muted);margin-top:4px}
  .card{background:#fff;border:1px solid var(--cream-deep);border-radius:22px;padding:22px 20px;box-shadow:0 16px 36px -26px var(--shadow);margin-top:20px}
  .card h2{font-family:'Reem Kufi',sans-serif;font-size:18px;color:var(--pine);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .card .sub{font-size:13px;color:var(--muted);margin-bottom:18px}
  .big{display:flex;gap:14px;margin-bottom:20px}
  .stat{flex:1;background:linear-gradient(140deg,#FFFDF8,#F4EFE3);border:1px solid var(--cream-deep);border-radius:16px;padding:16px;text-align:center}
  .stat .v{font-family:'Reem Kufi',sans-serif;font-weight:700;font-size:28px;color:var(--pine)}
  .stat .l{font-size:12.5px;color:var(--muted);margin-top:2px}
  .stat.water .v{color:var(--sage)}
  .stat.prog .v{color:var(--apricot-deep)}
  .items{display:flex;flex-direction:column;gap:2px}
  .it{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:12px}
  .it+.it{border-top:1px solid #F4EEE1}
  .it .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:13px;flex:0 0 auto}
  .it.on .dot{background:var(--sage);color:#fff}
  .it.off .dot{background:#F0E7D6;color:#C9Bfa9}
  .it .em{font-size:18px}
  .it .lab{flex:1;font-size:15px}
  .it.off .lab{color:var(--muted)}
  .it .tag{font-size:12px;font-weight:700;font-family:'Reem Kufi',sans-serif}
  .it.on .tag{color:var(--sage)}
  .it.off .tag{color:var(--muted)}
  .hist{display:flex;flex-direction:column;gap:10px}
  .hrow{display:flex;align-items:center;gap:12px}
  .hrow .day{width:74px;font-size:13px;color:var(--pine-soft);font-weight:500;flex:0 0 auto}
  .bar{flex:1;height:26px;background:var(--cream);border-radius:8px;overflow:hidden;position:relative}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--sage-light),var(--sage));border-radius:8px;transition:width .5s}
  .bar .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--pine);font-weight:600}
  .water-mini{font-size:13px;color:var(--sage);font-weight:600;width:54px;text-align:left;flex:0 0 auto;direction:ltr}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px}
  .setup{background:#FBEDE8;border:1px solid #EFC9BC;border-radius:18px;padding:20px;text-align:center;color:#8C5648;font-size:14px;line-height:1.8;margin-top:24px}
  .setup b{font-family:'Reem Kufi',sans-serif;color:#B5644F;display:block;margin-bottom:6px;font-size:16px}
  .refresh{display:block;margin:22px auto 0;background:var(--pine);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-family:'Reem Kufi',sans-serif;font-weight:600;font-size:14.5px;cursor:pointer}
  .foot{text-align:center;font-size:12.5px;color:var(--muted);margin-top:30px;opacity:.8}
  .load{text-align:center;color:var(--muted);padding:30px;font-size:14px}
</style>
</head>
<body>
<header>
  <div class="eyebrow">لوحة المتابعة</div>
  <h1>متابعة آية</h1>
  <div class="d" id="dateline">—</div>
</header>

<div class="wrap" id="app">
  <div class="load" id="load">جارٍ التحميل…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* نفس إعدادات التطبيق الرئيسي — عبّئها بنفس القيم */
  var SUPA_URL='https://vwzppnjxbmkdknzxyrle.supabase.co';
  var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3enBwbmp4Ym1rZGtuenh5cmxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NzA3OTEsImV4cCI6MjA5ODI0Njc5MX0.ClasZhTrDgt3ku8n88vhc3dxmPu2ZbVsoEu2uzLYBfY';
  var FAMILY_ID='00c5bd1d-38b7-4470-a3d5-f195fc77572c';

  var ITEMS=[
    {id:'folic',e:'💊',t:'حمض الفوليك'},{id:'wake',e:'🌅',t:'لقمة قبل النهوض'},
    {id:'bfast',e:'🍳',t:'الفطور'},{id:'snk1',e:'🍎',t:'سناك الضحى'},
    {id:'lunch',e:'🥗',t:'الغداء'},{id:'snk2',e:'🍵',t:'سناك العصر'},
    {id:'dinner',e:'🌙',t:'العشاء'},{id:'milk',e:'🥛',t:'حليب قبل النوم'}
  ];
  var DAYS=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  function p2(n){return n<10?'0'+n:''+n;}
  function iso(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}

  var app=document.getElementById('app');
  var supa=null;
  try{ if(SUPA_URL&&SUPA_KEY&&FAMILY_ID&&window.supabase){supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);} }catch(e){}

  document.getElementById('dateline').textContent=new Date().toLocaleDateString('ar',{weekday:'long',day:'numeric',month:'long'});

  if(!supa){
    app.innerHTML='<div class="setup"><b>الإعدادات غير مكتملة</b>عبّئ القيم الثلاث (SUPA_URL · SUPA_KEY · FAMILY_ID) في أعلى هذا الملف وملف index.html بنفس القيم، ثم انشر التحديث.</div>';
  } else {
    load();
  }

  function load(){
    app.innerHTML='<div class="load">جارٍ التحميل…</div>';
    var today=iso(new Date());
    var weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-6);
    supa.from('daily_logs').select('log_date,checklist,water_count')
      .eq('family_id',FAMILY_ID).gte('log_date',iso(weekAgo)).order('log_date',{ascending:false})
      .then(function(res){
        var rows=(res&&res.data)?res.data:[];
        render(rows,today);
      },function(){ app.innerHTML='<div class="empty">تعذّر الاتصال. حدّث الصفحة.</div>'; });
  }

  function render(rows,today){
    var map={};rows.forEach(function(r){map[r.log_date]=r;});
    var t=map[today]||{checklist:{},water_count:0};
    var cl=t.checklist||{};
    var done=ITEMS.filter(function(i){return cl[i.id]}).length;
    var pct=Math.round(done/ITEMS.length*100);

    var html='';
    // today summary
    html+='<div class="card"><h2>🌿 يومها الآن</h2><div class="sub">ملخّص تقدّم آية اليوم</div>';
    html+='<div class="big">';
    html+='<div class="stat prog"><div class="v">'+pct+'%</div><div class="l">القائمة ('+done+'/'+ITEMS.length+')</div></div>';
    html+='<div class="stat water"><div class="v">'+(t.water_count||0)+'</div><div class="l">أكواب الماء / 8</div></div>';
    html+='</div>';
    html+='<div class="items">';
    ITEMS.forEach(function(it){
      var on=!!cl[it.id];
      html+='<div class="it '+(on?'on':'off')+'"><span class="dot">'+(on?'✓':'·')+'</span><span class="em">'+it.e+'</span><span class="lab">'+it.t+'</span><span class="tag">'+(on?'تم':'—')+'</span></div>';
    });
    html+='</div></div>';

    // 7-day history
    html+='<div class="card"><h2>📅 آخر ٧ أيام</h2><div class="sub">نسبة إكمال القائمة وأكواب الماء</div><div class="hist">';
    for(var i=0;i<7;i++){
      var d=new Date();d.setDate(d.getDate()-i);
      var key=iso(d);var r=map[key];
      var dn=r?ITEMS.filter(function(it){return (r.checklist||{})[it.id]}).length:0;
      var pc=Math.round(dn/ITEMS.length*100);
      var w=r?(r.water_count||0):0;
      var label=(i===0?'اليوم':DAYS[d.getDay()]);
      html+='<div class="hrow"><span class="day">'+label+'</span><div class="bar"><div class="fill" style="width:'+pc+'%"></div><span class="txt">'+pc+'%</span></div><span class="water-mini">💧 '+w+'</span></div>';
    }
    html+='</div></div>';

    html+='<button class="refresh" onclick="load()">↻ تحديث</button>';
    html+='<div class="foot">تتحدّث تلقائيًا كل ما فتحت الصفحة 🤍</div>';

    // قسم التذكيرات
    html+='<div class="card" style="margin-top:24px"><h2>🔔 التذكيرات</h2><div class="sub">عدّلي الأوقات والتفعيل من هنا</div>';
    html+='<div id="remindersList" style="display:flex;flex-direction:column;gap:8px;margin-top:16px;max-height:300px;overflow-y:auto"></div>';
    html+='<button class="refresh" onclick="openAddReminder()" style="margin-top:12px;background:#8FA98A">+ إضافة تذكير جديد</button>';
    html+='</div>';

    // رسم بياني الأسبوع
    html+='<div class="card" style="margin-top:24px"><h2>📈 رسم بياني الأسبوع</h2><div id="weekChart" style="margin-top:16px"></div></div>';

    app.innerHTML=html;
    loadReminders();
    drawWeekChart(rows);
  }

  // ---- التذكيرات ----
  async function loadReminders(){
    if(!supa)return;
    const {data:rem}=await supa.from('reminders').select('*').eq('family_id',FAMILY_ID).order('sort',{ascending:true});
    if(!rem)return;
    var html='';
    rem.forEach(function(r){
      var timeStr=p2(r.hour)+':'+p2(r.minute);
      html+='<div style="display:flex;align-items:center;gap:12px;padding:12px;background:#F3EBDA;border-radius:12px;justify-content:space-between">';
      html+='<div style="flex:1"><span style="font-size:18px">'+r.emoji+'</span> <span style="color:#24463A;font-weight:600">'+r.title+'</span></div>';
      html+='<span style="font-family:monospace;color:#6F6A5C;font-size:14px;min-width:50px">'+timeStr+'</span>';
      html+='<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" '+(r.enabled?'checked':'')+" onchange=\"toggleReminder('"+r.id+"', this.checked)\" style=\"cursor:pointer\"><span style=\"font-size:12px;color:#6F6A5C\">مفعّل</span></label>";
      html+='<button onclick="editReminder(\''+r.id+'\', \''+r.emoji+'\', \''+r.title.replace(/'/g,'\\\\u0027')+'\', '+r.hour+', '+r.minute+')" style="padding:6px 12px;border:none;border-radius:8px;background:#E3A06B;color:#fff;cursor:pointer;font-size:12px;font-weight:600">عدّل</button>';
      html+='<button onclick="deleteReminder(\''+r.id+'\')" style="padding:6px 12px;border:none;border-radius:8px;background:#D58B7C;color:#fff;cursor:pointer;font-size:12px;font-weight:600">حذف</button>';
      html+='</div>';
    });
    document.getElementById('remindersList').innerHTML=html;
  }

  async function toggleReminder(id,enabled){
    if(!supa)return;
    await supa.from('reminders').update({enabled:enabled}).eq('id',id);
    loadReminders();
  }

  async function deleteReminder(id){
    if(!confirm('حذف هذا التذكير؟'))return;
    if(!supa)return;
    await supa.from('reminders').delete().eq('id',id);
    loadReminders();
  }

  function editReminder(id,emoji,title,h,m){
    var newEmoji=prompt('الرمز:',emoji);if(!newEmoji)return;
    var newTitle=prompt('الاسم:',title);if(!newTitle)return;
    var newH=prompt('الساعة (0-23):',''+h);if(!newH)return;
    var newM=prompt('الدقيقة (0-59):',''+m);if(!newM)return;
    if(supa){
      supa.from('reminders').update({emoji:newEmoji,title:newTitle,hour:parseInt(newH),minute:parseInt(newM)}).eq('id',id).then(function(){loadReminders();});
    }
  }

  function openAddReminder(){
    var emoji=prompt('الرمز:','🍳');if(!emoji)return;
    var title=prompt('الاسم:','وجبة جديدة');if(!title)return;
    var h=prompt('الساعة (0-23):','12');if(!h)return;
    var m=prompt('الدقيقة (0-59):','0');if(!m)return;
    if(supa){
      supa.from('reminders').insert({family_id:FAMILY_ID,emoji:emoji,title:title,hour:parseInt(h),minute:parseInt(m)}).then(function(){loadReminders();});
    }
  }

  // رسم بياني الأسبوع
  function drawWeekChart(rows){
    var chart=document.getElementById('weekChart');if(!chart)return;
    var map={};rows.forEach(function(r){map[r.log_date]=r;});
    var html='<div style="display:flex;flex-direction:column;gap:10px">';
    for(var i=0;i<7;i++){
      var d=new Date();d.setDate(d.getDate()-i);
      var key=iso(d);var r=map[key];
      var dn=r?ITEMS.filter(function(it){return (r.checklist||{})[it.id]}).length:0;
      var pc=Math.round(dn/ITEMS.length*100);
      var label=(i===0?'اليوم':DAYS[d.getDay()]);
      html+='<div><span style="font-weight:600;color:#24463A;width:60px;display:inline-block">'+label+'</span>';
      html+='<div style="display:inline-block;width:150px;height:20px;background:#E3EBDA;border-radius:6px;overflow:hidden;margin:0 10px">';
      html+='<div style="height:100%;width:'+pc+'%;background:linear-gradient(90deg,#8FA98A,#6B8A7F);transition:width .3s"></div></div>';
      html+='<span style="color:#6F6A5C;font-size:13px">'+pc+'%</span></div>';
    }
    html+='</div>';
    chart.innerHTML=html;
  }

  window.load=load;
</script>
</body>
</html>
